<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Уровень 4: Осознание Мира</title>
  <style>
    body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { border: 1px solid #333; cursor: grab; }
    canvas:active { cursor: grabbing; }
    #hint { position: fixed; top: 10px; left: 10px; color: #888; font-family: sans-serif; font-size: 13px; }
  </style>
</head>
<body>
  <div id="hint">ЛКМ + мышь — орбита | Колесо / W,S — зум | A,D — орбита с клавиатуры</div>
  <canvas id="canvas" width="800" height="600"></canvas>

  <script>
    // Теперь на вход шейдеру идёт готовая MVP-матрица, а не просто u_model.
    const VERTEX_SHADER_SRC = `#version 300 es
      layout(location = 0) in vec3 a_position;
      layout(location = 1) in vec3 a_color;
      uniform mat4 u_mvp;
      out vec3 v_color;
      void main() {
        v_color = a_color;
        gl_Position = u_mvp * vec4(a_position, 1.0);
      }
    `;

    const FRAGMENT_SHADER_SRC = `#version 300 es
      precision mediump float;
      in vec3 v_color;
      out vec4 outColor;
      void main() {
        outColor = vec4(v_color, 1.0);
      }
    `;

    function compileShader(gl, type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);
      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        throw new Error('Ошибка компиляции шейдера: ' + gl.getShaderInfoLog(shader));
      }
      return shader;
    }

    function createProgram(gl, vsSource, fsSource) {
      const vs = compileShader(gl, gl.VERTEX_SHADER, vsSource);
      const fs = compileShader(gl, gl.FRAGMENT_SHADER, fsSource);
      const program = gl.createProgram();
      gl.attachShader(program, vs);
      gl.attachShader(program, fs);
      gl.linkProgram(program);
      if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        throw new Error('Ошибка линковки программы: ' + gl.getProgramInfoLog(program));
      }
      return program;
    }

    async function main() {
      const canvas = document.getElementById('canvas');
      const gl = canvas.getContext('webgl2');
      if (!gl) {
        alert('WebGL2 не поддерживается');
        return;
      }
      gl.enable(gl.DEPTH_TEST); // теперь у нас настоящее 3D — включаем тест глубины

      let uMvpLocation = null;

      const importObject = {
        env: {
          js_clear_color: (r, g, b, a) => gl.clearColor(r, g, b, a),
          js_clear: () => gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT),
          js_draw_triangles: (first, count) => gl.drawArrays(gl.TRIANGLES, first, count),
          js_set_mvp_matrix: (ptr) => {
            const m = new Float32Array(exports.memory.buffer, ptr, 16);
            gl.uniformMatrix4fv(uMvpLocation, false, m);
          },
        }
      };

      const response = await fetch('elemental.wasm');
      const bytes = await response.arrayBuffer();
      const { instance } = await WebAssembly.instantiate(bytes, importObject);
      const exports = instance.exports;

      // --- Вершины ---
      const vertexPtr = exports.get_vertex_ptr();
      const vertexCount = exports.get_vertex_count();
      const stride = exports.get_vertex_stride();
      const vertexData = new Float32Array(exports.memory.buffer, vertexPtr, vertexCount * stride);

      const program = createProgram(gl, VERTEX_SHADER_SRC, FRAGMENT_SHADER_SRC);
      uMvpLocation = gl.getUniformLocation(program, 'u_mvp');

      const vao = gl.createVertexArray();
      gl.bindVertexArray(vao);
      const vbo = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
      gl.bufferData(gl.ARRAY_BUFFER, vertexData, gl.STATIC_DRAW);

      const strideBytes = stride * 4;
      gl.enableVertexAttribArray(0);
      gl.vertexAttribPointer(0, 3, gl.FLOAT, false, strideBytes, 0);
      gl.enableVertexAttribArray(1);
      gl.vertexAttribPointer(1, 3, gl.FLOAT, false, strideBytes, 3 * 4);

      gl.useProgram(program);
      gl.bindVertexArray(vao);

      // --- Буфер ввода: прямой доступ к памяти Wasm по известному адресу ---
      const inputPtr = exports.get_input_ptr();
      // Индексы: 0=mouseDX, 1=mouseDY, 2=wheelDelta, 3=W, 4=S, 5=A, 6=D
      const inputView = new Float32Array(exports.memory.buffer, inputPtr, 7);

      // --- Мышь: перетаскивание ЛКМ вращает камеру ---
      let isDragging = false;
      canvas.addEventListener('mousedown', (e) => {
        if (e.button === 0) isDragging = true;
      });
      window.addEventListener('mouseup', () => { isDragging = false; });
      window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        // Накапливаем дельту — Wasm сам обнулит её после чтения в update()
        inputView[0] += e.movementX;
        inputView[1] += e.movementY;
      });

      // --- Колесо мыши: зум ---
      canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        inputView[2] += e.deltaY;
      }, { passive: false });

      // --- Клавиатура: состояние клавиш (не дельта, а "зажата/нет") ---
      const keyMap = { 'w': 3, 's': 4, 'a': 5, 'd': 6 };
      window.addEventListener('keydown', (e) => {
        const idx = keyMap[e.key.toLowerCase()];
        if (idx !== undefined) inputView[idx] = 1.0;
      });
      window.addEventListener('keyup', (e) => {
        const idx = keyMap[e.key.toLowerCase()];
        if (idx !== undefined) inputView[idx] = 0.0;
      });

      exports.init();

      const startTime = performance.now();
      function frame(nowMs) {
        const t = (nowMs - startTime) / 1000;
        const aspect = canvas.width / canvas.height;
        exports.update(t, aspect);
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    main().catch(console.error);
  </script>
</body>
</html>
